<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Загрузка фото для экипажа</title>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Добро пожаловать в экипаж!</h1>
        <p class="lead">Загрузите свою фотографию для знакомства</p>

        <form method="post" enctype="multipart/form-data" class="mb-4">
            <div class="mb-3">
                <label for="photo" class="form-label">Выберите фото</label>
                <input class="form-control" type="file" id="photo" name="photo" accept="image/*" required>
            </div>
            <button type="submit" class="btn btn-primary">Загрузить</button>
        </form>

        {% if filename %}
            <h3>Ваше фото:</h3>
            <img src="{{ url_for('static', filename='img/' + filename) }}" class="img-fluid rounded" alt="Загруженное фото" style="max-width: 400px;">
        {% else %}
            <p class="text-muted">Фото ещё не загружено</p>
        {% endif %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
