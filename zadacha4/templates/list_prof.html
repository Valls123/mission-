{% extends "base.html" %}

{% block content %}
    <h3 style="color: gray">И на Марсе будут яблони цвести</h3>

    {% if style == "ol" %}
        <ol>
            {% for prof in prof_list %}
                <li>{{ prof }}</li>
            {% endfor %}
        </ol>
    {% elif style == "ul" %}
        <ul>
            {% for prof in prof_list %}
                <li>{{ prof }}</li>
            {% endfor %}
        </ul>
    {% endif %}
{% endblock %}
